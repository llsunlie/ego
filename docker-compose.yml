services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ego
      POSTGRES_USER: ego
      POSTGRES_PASSWORD: ego
    ports:
      - "5432:5432"
    volumes:
      - ego_pgdata:/var/lib/postgresql/data

volumes:
  ego_pgdata:
    driver: local
    driver_opts:
      type: none
      device: ./data
      o: bind
