services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ego
      POSTGRES_USER: ego
      POSTGRES_PASSWORD: ego
    ports:
      - "5432:5432"
    volumes:
      - ego_pgdata:/var/lib/postgresql/data
    # Structured JSON logs for Loki
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "10081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  elasticsearch:
    build:
      dockerfile_inline: |
        FROM docker.elastic.co/elasticsearch/elasticsearch:8.15.5
        ARG IK_VERSION=8.15.5
        RUN elasticsearch-plugin install --batch \
            "https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-${IK_VERSION}.zip"
    container_name: ego-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  # ── Monitoring stack ──────────────────────────────

  prometheus:
    image: prom/prometheus:v3.2.0
    container_name: ego-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:3.4.0
    container_name: ego-loki
    user: "0:0"
    command: "-config.file=/etc/loki/loki-config.yml"
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/tmp/loki

  promtail:
    image: grafana/promtail:3.4.0
    container_name: ego-promtail
    command: "-config.file=/etc/promtail/promtail-config.yml"
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount the ego-server log directory so promtail can read it.
      - ./server/.tmp/logs/server:/var/log/ego:ro

  grafana:
    image: grafana/grafana:12.1.0
    container_name: ego-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: http://localhost:3200
    ports:
      - "3200:3000"
    volumes:
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana_data:/var/lib/grafana

volumes:
  ego_pgdata:
    driver: local
    driver_opts:
      type: none
      device: ./data
      o: bind
  prometheus_data:
  loki_data:
  grafana_data:
  elasticsearch_data:
