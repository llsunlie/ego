server:
  http_listen_port: 0
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ego-server-logs
    pipeline_stages:
      - json:
          expressions:
            ts: time
            level: level
            msg: msg
            caller: caller
            user_id: user_id
            request_id: request_id
            method: method
            req: req
            res: res
            error: error
      - timestamp:
          source: ts
          format: RFC3339Nano
      - labels:
          level:
          method:
    static_configs:
      - targets:
          - localhost
        labels:
          job: ego-server
          __path__: /var/log/ego/*.log

  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
