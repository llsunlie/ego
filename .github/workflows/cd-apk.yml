name: CD APK

# Android APK 发布：推送版本 tag 或手动触发时，构建签名 APK 并创建 GitHub Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  # 单 job：构建签名 APK → 重命名 → 发布 Release
  build_and_release:
    name: Build APK & Release
    runs-on: ubuntu-latest

    # 授权创建 GitHub Releases
    permissions:
      contents: write

    steps:
      # 拉取仓库代码
      - name: checkout
        uses: actions/checkout@v4

      # JDK 17，Android 构建必需
      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 安装 Flutter，开启缓存，版本固定与本地一致
      - name: setup flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      # 安装 Dart 依赖
      - name: pub get
        run: cd client && flutter pub get

      # 构建 release APK（从 secret 解码 keystore，通过环境变量传入签名参数）
      - name: build apk
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > client/android/app/upload-keystore.jks
          cd client && flutter build apk --release --dart-define=SERVER_HOST=${{ secrets.TENCENT_HOST }}
        env:
          ANDROID_KEYSTORE_PATH: upload-keystore.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      # 按版本号重命名 APK
      - name: rename apk
        id: rename
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}"
          APK_PATH="client/build/app/outputs/flutter-apk/app-release.apk"
          NEW_NAME="ego-android-${VERSION}.apk"
          mv "$APK_PATH" "$NEW_NAME"
          echo "apk_path=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 创建 GitHub Release 并上传 APK
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rename.outputs.version }}
          name: Ego Release ${{ steps.rename.outputs.version }}
          body: |
            Ego Android APK 发布

            版本: ${{ steps.rename.outputs.version }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.rename.outputs.apk_path }}
