<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ego">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ego</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @font-face {
      font-family: 'NotoSansSC';
      src: url('assets/fonts/NotoSansSC-Regular.woff2') format('woff2');
      font-display: swap;
    }
    #ego-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      z-index: 9999;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #ego-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: ego-spin 0.8s linear infinite;
    }
    @keyframes ego-spin {
      to { transform: rotate(360deg); }
    }
    #ego-loading .text {
      margin-top: 16px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div id="ego-loading">
    <div class="spinner"></div>
    <div class="text">ego</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // 当 Flutter 渲染出第一个元素后移除 loading 指示器
    var observer = new MutationObserver(function(mutations, obs) {
      if (document.querySelector('flt-glass-pane, flt-scene, flutter-view')) {
        var el = document.getElementById('ego-loading');
        if (el) el.remove();
        obs.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
    // 兜底：15 秒后渐隐，避免一直卡在 loading
    setTimeout(function() {
      var el = document.getElementById('ego-loading');
      if (el) { el.style.opacity = '0'; el.style.pointerEvents = 'none'; }
      observer.disconnect();
    }, 15000);
  </script>
</body>
</html>
