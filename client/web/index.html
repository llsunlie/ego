<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ego">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ego</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preload critical assets: start downloading during HTML parse, before scripts run -->
  <link rel="preload" href="canvaskit/chromium/canvaskit.wasm" as="fetch" crossorigin="anonymous">
  <link rel="preload" href="main.dart.js" as="script">
  <!-- ego-logo.webp loaded by Flutter asset system, no preload needed -->

  <style>
    @font-face {
      font-family: 'NotoSansSC';
      src: url('assets/fonts/noto-sans-sc-v40-chinese-simplified-regular.woff2') format('woff2');
      font-display: swap;
    }
    #ego-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      z-index: 9999;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #ego-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: ego-spin 0.8s linear infinite;
    }
    @keyframes ego-spin {
      to { transform: rotate(360deg); }
    }
    #ego-loading .text {
      margin-top: 16px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      letter-spacing: 0.05em;
    }
    #ego-loading .progress-track {
      margin-top: 20px;
      width: 220px;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    #ego-loading .progress-fill {
      width: 0%;
      height: 100%;
      background: #6366f1;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    #ego-loading .progress-label {
      margin-top: 8px;
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <script>window._egoPerf={t0:performance.now()};</script>
  <div id="ego-loading">
    <div class="spinner"></div>
    <div class="text">ego</div>
    <div class="progress-track"><div id="ego-progress-fill" class="progress-fill"></div></div>
    <div id="ego-progress-label" class="progress-label">启动中...</div>
  </div>
  <script>
    // Force local CanvasKit and fonts instead of downloading from gstatic.com
    (function() {
      // ── 0. Eagerly fetch bundled fonts once, serve all subsequent requests from memory ──
      var fontCache = {};    // Uint8Array — populated when first real fetch completes
      var fontInflight = {}; // Promise  — dedup concurrent fetches for same font
      var fontPaths = {
        notosanssc:      '/assets/fonts/noto-sans-sc-v40-chinese-simplified-regular.woff2',
        notosanssymbols2:'/assets/fonts/noto-sans-symbols-2-v25-symbols-regular.woff2',
        materialicons:   '/assets/fonts/MaterialIcons-Regular.otf',
      };
      var robotoKey = 'notosanssc';

      // Build filename→key lookup so we match URLs regardless of leading-slash / base-href
      var fileNameKeys = {};
      Object.keys(fontPaths).forEach(function(k) {
        fileNameKeys[fontPaths[k].split('/').pop()] = k;
      });

      // Intercept ALL fetch before anything else
      var origFetch = window.fetch;
      window.fetch = function(url, opts) {
        if (typeof url !== 'string') return origFetch.apply(this, arguments);

        // Resolve font key by filename (works for absolute, relative, and subset URLs)
        var key = null;
        for (var fname in fileNameKeys) {
          if (url.indexOf(fname) !== -1) { key = fileNameKeys[fname]; break; }
        }
        // Also match Google Fonts subset prefix (e.g. /assets/fonts/notosanssc/v37/...)
        if (!key) {
          for (var k in fontPaths) {
            if (url.indexOf('/assets/fonts/' + k + '/') !== -1) { key = k; break; }
          }
        }
        if (!key && url.indexOf('/assets/fonts/roboto/') !== -1) key = robotoKey;
        if (!key) return origFetch.apply(this, arguments);

        // Already cached → serve from memory
        if (fontCache[key]) {
          return Promise.resolve(new Response(
            fontCache[key].slice(),
            { status: 200, headers: { 'Content-Type': 'font/woff2' } }
          ));
        }

        // Dedup concurrent fetches: share a single in-flight promise per font
        if (!fontInflight[key]) {
          fontInflight[key] = origFetch(fontPaths[key])
            .then(function(r) { return r.arrayBuffer(); })
            .then(function(buf) { fontCache[key] = new Uint8Array(buf); return fontCache[key]; });
        }
        return fontInflight[key].then(function(buf) {
          return new Response(buf.slice(), { status: 200, headers: { 'Content-Type': 'font/woff2' } });
        });
      };

      // Kick off preload now — first fetch wins, concurrent ones wait on same promise
      var _fontCount = Object.keys(fontPaths).length;
      var _fontDone = 0;
      Object.keys(fontPaths).forEach(function(key) {
        fetch(fontPaths[key]).then(function() {
          _fontDone++;
          if (_fontDone >= _fontCount) window._egoFontReady = true;
        });
      });

      // ── 1. Intercept Flutter loader to inject local URLs ──
      window._flutter = window._flutter || {};
      var _loader = null;
      Object.defineProperty(window._flutter, 'loader', {
        configurable: true, enumerable: true,
        get: function() { return _loader; },
        set: function(loader) {
          if (loader && loader.load) {
            var origLoad = loader.load.bind(loader);
            loader.load = function(opts) {
              opts = opts || {};
              opts.config = opts.config || {};
              opts.config.canvasKitBaseUrl = '/canvaskit/';
              opts.config.fontFallbackBaseUrl = '/assets/fonts/';
              return origLoad(opts);
            };
          }
          _loader = loader;
        }
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // ── First-screen load timer + real progress bar (t0 already at <body> top) ──
    var _egoPerf = window._egoPerf;
    _egoPerf.fontsReady = null;
    _egoPerf.firstFrame = null;

    var _pFill = document.getElementById('ego-progress-fill');
    var _pLabel = document.getElementById('ego-progress-label');

    // 4 milestones, any order; progress = completed / total (× 90%, last 10% = first frame)
    var _pDone = { engine: false, main: false, canvas: false, fonts: false };
    var _pCount = Object.keys(_pDone).length;
    var _pDoneCnt = 0;
    var _pLabels = { engine: '引擎就绪', main: '应用加载', canvas: '渲染器就绪', fonts: '字体就绪' };
    var _pPcts  = [5, 25, 50, 75, 90];

    function _egoMarkDone(key) {
      if (_pDone[key]) return;
      _pDone[key] = true;
      _pDoneCnt++;
      _pFill.style.width = _pPcts[_pDoneCnt] + '%';
      _pLabel.textContent = _pLabels[key];
      if (key === 'fonts') {
        _egoPerf.fontsReady = performance.now();
        console.log('%c[ego] fonts ready %c' + (_egoPerf.fontsReady - _egoPerf.t0).toFixed(0) + 'ms', 'color:#6366f1', 'color:inherit');
      }
    }

    var _egoPoll = setInterval(function() {
      if (!_pDone.engine && window._flutter && window._flutter.loader)    _egoMarkDone('engine');
      if (!_pDone.main   && document.querySelector('script[src$="main.dart.js"]')) _egoMarkDone('main');
      if (!_pDone.canvas && (window.flutterCanvasKit || window._flutter_skwasmInstance)) _egoMarkDone('canvas');
      if (!_pDone.fonts  && window._egoFontReady)                                   _egoMarkDone('fonts');

      if (_pDoneCnt >= _pCount) {
        var w = parseFloat(_pFill.style.width);
        if (w < 88) { _pFill.style.width = (w + 0.8) + '%'; _pLabel.textContent = '即将完成...'; }
      }
    }, 80);

    // First frame: jump to 100%, log, remove loading after a brief moment
    var observer = new MutationObserver(function(mutations, obs) {
      if (document.querySelector('flt-glass-pane, flt-scene, flutter-view')) {
        clearInterval(_egoPoll);
        _egoPerf.firstFrame = performance.now();
        _pFill.style.width = '100%';
        _pLabel.textContent = '';
        var total = (_egoPerf.firstFrame - _egoPerf.t0).toFixed(0);
        var fontT = _egoPerf.fontsReady ? (_egoPerf.fontsReady - _egoPerf.t0).toFixed(0) : '—';
        console.log(
          '%c[ego] first frame %c' + total + 'ms %c(fonts ' + fontT + 'ms)',
          'color:#22c55e;font-weight:bold', 'color:inherit', 'color:#888'
        );
        window._egoPerf = _egoPerf;
        obs.disconnect();

        setTimeout(function() {
          var el = document.getElementById('ego-loading');
          if (el) el.remove();
        }, 200);
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
